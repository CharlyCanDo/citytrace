<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CityTrace — Explore Every Street</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --bg: #0a0c10;
    --surface: #12151c;
    --surface2: #1a1f2a;
    --border: #252b38;
    --accent: #00ff88;
    --accent2: #00c4ff;
    --warn: #ff6b35;
    --text: #e8edf5;
    --muted: #6b7585;
    --track: rgba(0,255,136,0.85);
    --fog: rgba(0,0,0,0.72);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    z-index: 1000;
    flex-shrink: 0;
  }

  .logo {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo span { color: var(--accent); }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 5px 10px;
    border-radius: 20px;
    transition: all 0.3s;
  }
  .status-pill.tracking { color: var(--accent); border-color: var(--accent); }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    transition: all 0.3s;
  }
  .status-pill.tracking .status-dot {
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.3); }
  }

  /* ── MAP ── */
  #map {
    flex: 1;
    width: 100%;
    z-index: 1;
    background: #0d1117;
  }

  /* Leaflet dark overrides */
  .leaflet-tile { filter: brightness(0.5) saturate(0.4) hue-rotate(180deg); }
  .leaflet-control-zoom a {
    background: var(--surface) !important;
    color: var(--text) !important;
    border-color: var(--border) !important;
  }
  .leaflet-control-zoom a:hover { background: var(--surface2) !important; }

  /* ── BOTTOM PANEL ── */
  .bottom-panel {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 14px 16px;
    z-index: 1000;
    flex-shrink: 0;
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 14px;
  }

  .stat-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    text-align: center;
  }
  .stat-val {
    font-family: 'Space Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }
  .stat-label {
    font-size: 10px;
    color: var(--muted);
    margin-top: 3px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* Progress bar */
  .progress-wrap {
    margin-bottom: 14px;
  }
  .progress-header {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
    font-family: 'Space Mono', monospace;
  }
  .progress-bar {
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 3px;
    transition: width 0.5s ease;
    width: 0%;
  }

  /* Buttons */
  .btn-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .btn {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 13px;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    background: var(--surface2);
    color: var(--text);
    letter-spacing: 0.3px;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    font-weight: 800;
  }
  .btn-primary:hover { background: #00e87a; }
  .btn-danger {
    border-color: var(--warn);
    color: var(--warn);
  }
  .btn-danger:hover { background: rgba(255,107,53,0.1); }
  .btn-secondary:hover { background: var(--border); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }

  /* ── SESSIONS DRAWER ── */
  .drawer-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 2000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .drawer-overlay.open { opacity: 1; pointer-events: all; }

  .drawer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-radius: 18px 18px 0 0;
    z-index: 2001;
    padding: 0 16px 32px;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
    max-height: 70dvh;
    display: flex;
    flex-direction: column;
  }
  .drawer.open { transform: translateY(0); }

  .drawer-handle {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 12px auto;
    flex-shrink: 0;
  }
  .drawer-title {
    font-size: 16px;
    font-weight: 800;
    margin-bottom: 14px;
    flex-shrink: 0;
  }
  .sessions-list {
    overflow-y: auto;
    flex: 1;
  }
  .session-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .session-item:hover { background: var(--surface2); }
  .session-info { flex: 1; }
  .session-name {
    font-weight: 600;
    font-size: 13px;
  }
  .session-meta {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-top: 3px;
  }
  .session-km {
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    margin-left: 12px;
  }
  .session-del {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 16px;
    cursor: pointer;
    padding: 4px 8px;
    transition: color 0.2s;
  }
  .session-del:hover { color: var(--warn); }
  .no-sessions {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    padding: 32px 0;
  }

  /* ── NOTIFICATION TOAST ── */
  .toast {
    position: fixed;
    top: 70px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 18px;
    font-size: 13px;
    font-weight: 600;
    z-index: 3000;
    opacity: 0;
    transition: all 0.3s;
    white-space: nowrap;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .toast.success { border-color: var(--accent); color: var(--accent); }
  .toast.info { border-color: var(--accent2); color: var(--accent2); }

  /* Fog canvas */
  #fog-canvas {
    position: absolute;
    top: 0; left: 0;
    pointer-events: none;
    z-index: 400;
  }

  /* Location marker */
  .my-marker {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--accent2);
    border: 3px solid #fff;
    box-shadow: 0 0 0 4px rgba(0,196,255,0.3), 0 2px 8px rgba(0,0,0,0.5);
    animation: locationPulse 2s infinite;
  }
  @keyframes locationPulse {
    0%,100% { box-shadow: 0 0 0 4px rgba(0,196,255,0.3), 0 2px 8px rgba(0,0,0,0.5); }
    50% { box-shadow: 0 0 0 10px rgba(0,196,255,0.1), 0 2px 8px rgba(0,0,0,0.5); }
  }
</style>
</head>
<body>

<header>
  <div class="logo">🧭 City<span>Trace</span></div>
  <div class="status-pill" id="statusPill">
    <div class="status-dot"></div>
    <span id="statusText">Prêt</span>
  </div>
</header>

<div id="map"></div>

<div class="bottom-panel">
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-val" id="statDist">0.0</div>
      <div class="stat-label">km parcourus</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="statPts">0</div>
      <div class="stat-label">points GPS</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="statTime">00:00</div>
      <div class="stat-label">durée</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-header">
      <span>Zone explorée</span>
      <span id="pctText">0%</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" id="btnTrack" onclick="toggleTracking()">
      <span>▶</span> Démarrer
    </button>
    <button class="btn btn-secondary" id="btnSessions" onclick="openDrawer()">
      <span>📂</span> Sessions
    </button>
  </div>
</div>

<!-- Sessions Drawer -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-title">📂 Explorations sauvegardées</div>
  <div class="sessions-list" id="sessionsList"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── MAP INIT ──────────────────────────────────────────────────────────
const map = L.map('map', {
  center: [48.8566, 2.3522],
  zoom: 15,
  zoomControl: true,
  attributionControl: false
});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

// ── STATE ─────────────────────────────────────────────────────────────
let isTracking = false;
let watchId = null;
let currentTrack = []; // [{lat, lng, ts}]
let allTracks = [];    // all loaded from storage
let polyline = null;
let markerLayer = null;
let startTime = null;
let timerInterval = null;
let fogCanvas = null;
let fogCtx = null;
let revealedPoints = new Set();
let sessionStartIndex = 0; // index into allTracks for current session
let currentSessionId = null;

// ── STORAGE ───────────────────────────────────────────────────────────
function loadSessions() {
  try {
    return JSON.parse(localStorage.getItem('citytrace_sessions') || '[]');
  } catch { return []; }
}

function saveSession(session) {
  const sessions = loadSessions();
  const idx = sessions.findIndex(s => s.id === session.id);
  if (idx >= 0) sessions[idx] = session;
  else sessions.push(session);
  localStorage.setItem('citytrace_sessions', JSON.stringify(sessions));
}

function deleteSession(id) {
  let sessions = loadSessions();
  sessions = sessions.filter(s => s.id !== id);
  localStorage.setItem('citytrace_sessions', JSON.stringify(sessions));
}

// ── POLYLINE LAYER ────────────────────────────────────────────────────
function initPolyline() {
  if (polyline) map.removeLayer(polyline);
  polyline = L.polyline([], {
    color: '#00ff88',
    weight: 4,
    opacity: 0.9,
    lineCap: 'round',
    lineJoin: 'round'
  }).addTo(map);
}

// Load all previous tracks as dim lines
function loadAllTracks() {
  const sessions = loadSessions();
  sessions.forEach(s => {
    if (s.points && s.points.length > 1) {
      L.polyline(s.points.map(p => [p.lat, p.lng]), {
        color: '#00ff88',
        weight: 3,
        opacity: 0.35,
        lineCap: 'round'
      }).addTo(map);
    }
  });
}

// ── MARKER ────────────────────────────────────────────────────────────
function updateMarker(lat, lng) {
  if (markerLayer) map.removeLayer(markerLayer);
  const icon = L.divIcon({ className: '', html: '<div class="my-marker"></div>', iconSize: [18,18], iconAnchor: [9,9] });
  markerLayer = L.marker([lat, lng], { icon }).addTo(map);
}

// ── FOG OF WAR ────────────────────────────────────────────────────────
function initFog() {
  if (fogCanvas) fogCanvas.remove();
  fogCanvas = document.createElement('canvas');
  fogCanvas.id = 'fog-canvas';
  document.getElementById('map').style.position = 'relative';
  document.getElementById('map').appendChild(fogCanvas);
  resizeFog();
  window.addEventListener('resize', resizeFog);
  map.on('move zoom', redrawFog);
}

function resizeFog() {
  const mapEl = document.getElementById('map');
  fogCanvas.width = mapEl.clientWidth;
  fogCanvas.height = mapEl.clientHeight;
  fogCtx = fogCanvas.getContext('2d');
  redrawFog();
}

function redrawFog() {
  if (!fogCtx) return;
  const w = fogCanvas.width, h = fogCanvas.height;
  fogCtx.clearRect(0, 0, w, h);

  // Dark overlay
  fogCtx.fillStyle = 'rgba(0,0,0,0.68)';
  fogCtx.fillRect(0, 0, w, h);

  // Cut circles for each revealed point
  fogCtx.globalCompositeOperation = 'destination-out';
  const allPoints = getAllPoints();
  allPoints.forEach(p => {
    const pt = map.latLngToContainerPoint([p.lat, p.lng]);
    const grad = fogCtx.createRadialGradient(pt.x, pt.y, 0, pt.x, pt.y, 60);
    grad.addColorStop(0, 'rgba(0,0,0,1)');
    grad.addColorStop(0.6, 'rgba(0,0,0,0.8)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    fogCtx.fillStyle = grad;
    fogCtx.beginPath();
    fogCtx.arc(pt.x, pt.y, 60, 0, Math.PI * 2);
    fogCtx.fill();
  });
  fogCtx.globalCompositeOperation = 'source-over';
}

function getAllPoints() {
  const sessions = loadSessions();
  let pts = [];
  sessions.forEach(s => pts = pts.concat(s.points || []));
  pts = pts.concat(currentTrack);
  return pts;
}

// ── STATS ─────────────────────────────────────────────────────────────
function calcDistance(pts) {
  let d = 0;
  for (let i = 1; i < pts.length; i++) {
    d += map.distance([pts[i-1].lat, pts[i-1].lng], [pts[i].lat, pts[i].lng]);
  }
  return d;
}

function formatDuration(ms) {
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  const h = Math.floor(m / 60);
  if (h > 0) return `${h}h${String(m%60).padStart(2,'0')}`;
  return `${String(m).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}

function updateStats() {
  const dist = calcDistance(currentTrack);
  document.getElementById('statDist').textContent = (dist/1000).toFixed(2);
  document.getElementById('statPts').textContent = currentTrack.length;
  if (startTime) {
    document.getElementById('statTime').textContent = formatDuration(Date.now() - startTime);
  }

  // Zone coverage estimate (based on unique grid cells covered)
  const allPts = getAllPoints();
  const cells = new Set();
  allPts.forEach(p => {
    const cellLat = Math.floor(p.lat * 400);
    const cellLng = Math.floor(p.lng * 400);
    cells.add(`${cellLat},${cellLng}`);
  });
  // Rough % of a ~1km² zone
  const pct = Math.min(100, (cells.size * 0.04)).toFixed(1);
  document.getElementById('pctText').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';
}

// ── TRACKING ─────────────────────────────────────────────────────────
function toggleTracking() {
  if (isTracking) stopTracking();
  else startTracking();
}

function startTracking() {
  if (!navigator.geolocation) {
    showToast('GPS non disponible sur ce navigateur', 'info');
    return;
  }
  isTracking = true;
  currentTrack = [];
  currentSessionId = Date.now().toString();
  startTime = Date.now();

  const pill = document.getElementById('statusPill');
  pill.classList.add('tracking');
  document.getElementById('statusText').textContent = 'Suivi actif';

  const btn = document.getElementById('btnTrack');
  btn.innerHTML = '<span>⏹</span> Arrêter';
  btn.classList.remove('btn-primary');
  btn.classList.add('btn-danger');

  initPolyline();

  timerInterval = setInterval(updateStats, 1000);

  watchId = navigator.geolocation.watchPosition(
    onPosition,
    onGpsError,
    { enableHighAccuracy: true, maximumAge: 2000, timeout: 10000 }
  );

  showToast('📍 Suivi GPS démarré !', 'success');
}

function onPosition(pos) {
  const { latitude: lat, longitude: lng, accuracy } = pos.coords;
  const pt = { lat, lng, ts: Date.now() };
  currentTrack.push(pt);

  updateMarker(lat, lng);
  polyline.addLatLng([lat, lng]);

  if (currentTrack.length === 1) {
    map.setView([lat, lng], 16);
  }

  // Auto-save every 10 pts
  if (currentTrack.length % 10 === 0) autoSave();

  redrawFog();
  updateStats();
}

function onGpsError(err) {
  showToast('Erreur GPS : ' + err.message, 'info');
}

function stopTracking() {
  if (watchId !== null) {
    navigator.geolocation.clearWatch(watchId);
    watchId = null;
  }
  clearInterval(timerInterval);
  isTracking = false;

  const pill = document.getElementById('statusPill');
  pill.classList.remove('tracking');
  document.getElementById('statusText').textContent = 'Arrêté';

  const btn = document.getElementById('btnTrack');
  btn.innerHTML = '<span>▶</span> Démarrer';
  btn.classList.add('btn-primary');
  btn.classList.remove('btn-danger');

  if (currentTrack.length > 0) {
    finalSave();
    showToast('✅ Exploration sauvegardée !', 'success');
  }
}

function autoSave() {
  if (currentTrack.length === 0) return;
  const session = {
    id: currentSessionId,
    name: 'Session ' + new Date().toLocaleDateString('fr-FR'),
    date: new Date().toISOString(),
    points: [...currentTrack],
    distance: calcDistance(currentTrack),
    duration: startTime ? Date.now() - startTime : 0
  };
  saveSession(session);
}

function finalSave() {
  autoSave();
  currentSessionId = null;
}

// ── DRAWER ────────────────────────────────────────────────────────────
function openDrawer() {
  renderSessions();
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawerOverlay').classList.add('open');
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawerOverlay').classList.remove('open');
}

function renderSessions() {
  const sessions = loadSessions().reverse();
  const el = document.getElementById('sessionsList');
  if (sessions.length === 0) {
    el.innerHTML = '<div class="no-sessions">Aucune exploration sauvegardée.<br>Lance ton premier trajet !</div>';
    return;
  }
  el.innerHTML = sessions.map(s => {
    const d = new Date(s.date);
    const dateStr = d.toLocaleDateString('fr-FR', { day:'2-digit', month:'short', year:'numeric' });
    const timeStr = d.toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
    const km = ((s.distance || 0)/1000).toFixed(2);
    const dur = formatDuration(s.duration || 0);
    return `
      <div class="session-item" onclick="loadSession('${s.id}')">
        <div class="session-info">
          <div class="session-name">${s.name}</div>
          <div class="session-meta">${dateStr} à ${timeStr} · ${dur}</div>
        </div>
        <div class="session-km">${km} km</div>
        <button class="session-del" onclick="event.stopPropagation(); removeSession('${s.id}')">✕</button>
      </div>
    `;
  }).join('');
}

function loadSession(id) {
  const sessions = loadSessions();
  const s = sessions.find(x => x.id === id);
  if (!s || !s.points || s.points.length === 0) return;
  closeDrawer();
  const center = s.points[Math.floor(s.points.length/2)];
  map.setView([center.lat, center.lng], 15);
  showToast('📍 Session affichée', 'info');
}

function removeSession(id) {
  if (confirm('Supprimer cette exploration ?')) {
    deleteSession(id);
    renderSessions();
    showToast('🗑 Session supprimée', 'info');
  }
}

// ── TOAST ─────────────────────────────────────────────────────────────
let toastTimeout = null;
function showToast(msg, type='info') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  if (toastTimeout) clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => el.className = 'toast', 2800);
}

// ── INIT ──────────────────────────────────────────────────────────────
initFog();
loadAllTracks();
initPolyline();
updateStats();

// Try to center on user location on load
navigator.geolocation && navigator.geolocation.getCurrentPosition(pos => {
  map.setView([pos.coords.latitude, pos.coords.longitude], 15);
  updateMarker(pos.coords.latitude, pos.coords.longitude);
}, () => {}, { enableHighAccuracy: true, timeout: 5000 });
</script>
</body>
</html>
