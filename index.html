<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CityTrace — Simulateur</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --bg: #0a0c10;
    --surface: #12151c;
    --surface2: #1a1f2a;
    --border: #252b38;
    --accent: #00ff88;
    --accent2: #00c4ff;
    --warn: #ff6b35;
    --text: #e8edf5;
    --muted: #6b7585;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    z-index: 1000;
    flex-shrink: 0;
  }
  .logo { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .sim-badge {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    background: rgba(255,107,53,0.15);
    border: 1px solid var(--warn);
    color: var(--warn);
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 1px;
  }

  #map {
    flex: 1;
    width: 100%;
    position: relative;
    background: #0d1117;
  }
  .leaflet-tile { filter: brightness(0.5) saturate(0.4) hue-rotate(180deg); }
  .leaflet-control-zoom a {
    background: var(--surface) !important;
    color: var(--text) !important;
    border-color: var(--border) !important;
  }

  /* Fog canvas */
  #fog-canvas {
    position: absolute;
    top: 0; left: 0;
    pointer-events: none;
    z-index: 400;
  }

  /* Bottom panel */
  .bottom-panel {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 14px 16px;
    z-index: 1000;
    flex-shrink: 0;
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 14px;
  }
  .stat-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    text-align: center;
  }
  .stat-val {
    font-family: 'Space Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }
  .stat-label {
    font-size: 10px;
    color: var(--muted);
    margin-top: 3px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .progress-wrap { margin-bottom: 14px; }
  .progress-header {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
    font-family: 'Space Mono', monospace;
  }
  .progress-bar { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 3px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .btn {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    background: var(--surface2);
    color: var(--text);
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 800; }
  .btn-primary:hover { background: #00e87a; }
  .btn-reset { border-color: var(--warn); color: var(--warn); }
  .btn-reset:hover { background: rgba(255,107,53,0.1); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }

  /* Speed selector */
  .speed-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }
  .speed-label {
    font-size: 11px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    white-space: nowrap;
  }
  .speed-btns { display: flex; gap: 6px; }
  .speed-btn {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .speed-btn.active { border-color: var(--accent2); color: var(--accent2); }

  /* Location marker */
  .my-marker {
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--accent2);
    border: 3px solid #fff;
    box-shadow: 0 0 0 4px rgba(0,196,255,0.3);
    animation: locPulse 1.5s infinite;
  }
  @keyframes locPulse {
    0%,100% { box-shadow: 0 0 0 4px rgba(0,196,255,0.3); }
    50% { box-shadow: 0 0 0 12px rgba(0,196,255,0.05); }
  }

  /* Status pill */
  .status-pill {
    display: flex; align-items: center; gap: 6px;
    font-family: 'Space Mono', monospace; font-size: 11px;
    color: var(--muted); background: var(--surface2);
    border: 1px solid var(--border); padding: 5px 10px;
    border-radius: 20px; transition: all 0.3s;
  }
  .status-pill.running { color: var(--accent); border-color: var(--accent); }
  .status-dot { width:7px; height:7px; border-radius:50%; background:var(--muted); transition: all 0.3s; }
  .status-pill.running .status-dot { background:var(--accent); box-shadow:0 0 8px var(--accent); animation: dotPulse 1s infinite; }
  @keyframes dotPulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
</style>
</head>
<body>

<header>
  <div class="logo">🧭 City<span>Trace</span></div>
  <div style="display:flex;gap:8px;align-items:center;">
    <div class="status-pill" id="statusPill">
      <div class="status-dot"></div>
      <span id="statusText">Prêt</span>
    </div>
    <div class="sim-badge">SIMULATION</div>
  </div>
</header>

<div id="map"></div>

<div class="bottom-panel">
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-val" id="statDist">0.00</div>
      <div class="stat-label">km parcourus</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="statPts">0</div>
      <div class="stat-label">points GPS</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="statTime">00:00</div>
      <div class="stat-label">durée</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-header">
      <span>Zone explorée (fog of war)</span>
      <span id="pctText">0.0%</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <div class="speed-row">
    <span class="speed-label">VITESSE :</span>
    <div class="speed-btns">
      <button class="speed-btn active" onclick="setSpeed(1)" id="sp1">×1</button>
      <button class="speed-btn" onclick="setSpeed(3)" id="sp3">×3</button>
      <button class="speed-btn" onclick="setSpeed(8)" id="sp8">×8</button>
      <button class="speed-btn" onclick="setSpeed(20)" id="sp20">×20</button>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" id="btnSim" onclick="toggleSim()">▶ Démarrer</button>
    <button class="btn btn-reset" onclick="resetSim()">↺ Réinitialiser</button>
  </div>
</div>

<script>
// ── MAP ───────────────────────────────────────────────────────────────
const map = L.map('map', { center: [48.8566, 2.3522], zoom: 16, zoomControl: true, attributionControl: false });
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

// ── SIMULATED ROUTE (Paris streets) ──────────────────────────────────
// A realistic walking route through central Paris
const ROUTE = [
  [48.8566, 2.3522],[48.8570, 2.3530],[48.8575, 2.3540],[48.8578, 2.3555],
  [48.8580, 2.3570],[48.8578, 2.3585],[48.8575, 2.3600],[48.8570, 2.3610],
  [48.8563, 2.3615],[48.8555, 2.3612],[48.8548, 2.3605],[48.8542, 2.3595],
  [48.8538, 2.3580],[48.8535, 2.3565],[48.8533, 2.3548],[48.8535, 2.3530],
  [48.8540, 2.3515],[48.8547, 2.3505],[48.8555, 2.3498],[48.8563, 2.3495],
  [48.8570, 2.3498],[48.8576, 2.3505],[48.8581, 2.3515],[48.8584, 2.3528],
  [48.8584, 2.3545],[48.8581, 2.3560],[48.8577, 2.3575],[48.8573, 2.3590],
  [48.8568, 2.3600],[48.8560, 2.3608],[48.8552, 2.3610],[48.8544, 2.3605],
  [48.8537, 2.3595],[48.8531, 2.3582],[48.8528, 2.3568],[48.8528, 2.3552],
  [48.8531, 2.3537],[48.8537, 2.3523],[48.8545, 2.3512],[48.8554, 2.3507],
  [48.8563, 2.3508],[48.8571, 2.3513],[48.8578, 2.3522],[48.8582, 2.3535],
  [48.8583, 2.3552],[48.8580, 2.3568],[48.8575, 2.3582],[48.8569, 2.3593],
  [48.8561, 2.3600],[48.8553, 2.3600],[48.8545, 2.3596],[48.8539, 2.3587],
  [48.8534, 2.3575],[48.8532, 2.3560],[48.8533, 2.3544],[48.8537, 2.3530],
  [48.8544, 2.3519],[48.8553, 2.3513],[48.8562, 2.3513],[48.8570, 2.3518],
  [48.8576, 2.3528],[48.8579, 2.3542],[48.8578, 2.3557],[48.8574, 2.3570],
  [48.8568, 2.3580],[48.8561, 2.3585],[48.8554, 2.3583],[48.8548, 2.3577],
  [48.8544, 2.3567],[48.8543, 2.3554],[48.8545, 2.3541],[48.8550, 2.3531],
  [48.8558, 2.3525],[48.8566, 2.3524]
];

// Interpolate between waypoints for smoother movement
function interpolateRoute(route, stepsPerSegment = 10) {
  const pts = [];
  for (let i = 0; i < route.length - 1; i++) {
    const [lat1, lng1] = route[i];
    const [lat2, lng2] = route[i+1];
    for (let s = 0; s < stepsPerSegment; s++) {
      const t = s / stepsPerSegment;
      pts.push([lat1 + (lat2-lat1)*t, lng1 + (lng2-lng1)*t]);
    }
  }
  pts.push(route[route.length-1]);
  return pts;
}

const FULL_ROUTE = interpolateRoute(ROUTE, 12);

// ── STATE ─────────────────────────────────────────────────────────────
let isRunning = false;
let currentIdx = 0;
let visitedPts = [];
let polyline = null;
let markerLayer = null;
let simInterval = null;
let startTime = null;
let timerInterval = null;
let speed = 1;
let fogCanvas = null;
let fogCtx = null;

// ── FOG ───────────────────────────────────────────────────────────────
function initFog() {
  if (fogCanvas) fogCanvas.remove();
  fogCanvas = document.createElement('canvas');
  fogCanvas.id = 'fog-canvas';
  const mapEl = document.getElementById('map');
  mapEl.style.position = 'relative';
  mapEl.appendChild(fogCanvas);
  resizeFog();
  window.addEventListener('resize', resizeFog);
  map.on('move zoom', redrawFog);
}

function resizeFog() {
  const mapEl = document.getElementById('map');
  fogCanvas.width = mapEl.clientWidth;
  fogCanvas.height = mapEl.clientHeight;
  fogCtx = fogCanvas.getContext('2d');
  redrawFog();
}

function redrawFog() {
  if (!fogCtx) return;
  const w = fogCanvas.width, h = fogCanvas.height;
  fogCtx.clearRect(0, 0, w, h);
  fogCtx.fillStyle = 'rgba(0,0,0,0.70)';
  fogCtx.fillRect(0, 0, w, h);
  fogCtx.globalCompositeOperation = 'destination-out';
  visitedPts.forEach(p => {
    const pt = map.latLngToContainerPoint(p);
    const r = 55;
    const grad = fogCtx.createRadialGradient(pt.x, pt.y, 0, pt.x, pt.y, r);
    grad.addColorStop(0, 'rgba(0,0,0,1)');
    grad.addColorStop(0.55, 'rgba(0,0,0,0.85)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    fogCtx.fillStyle = grad;
    fogCtx.beginPath();
    fogCtx.arc(pt.x, pt.y, r, 0, Math.PI * 2);
    fogCtx.fill();
  });
  fogCtx.globalCompositeOperation = 'source-over';
}

// ── POLYLINE ──────────────────────────────────────────────────────────
function initPolyline() {
  if (polyline) map.removeLayer(polyline);
  polyline = L.polyline([], {
    color: '#00ff88', weight: 4, opacity: 0.9,
    lineCap: 'round', lineJoin: 'round'
  }).addTo(map);
}

// ── MARKER ────────────────────────────────────────────────────────────
function updateMarker(lat, lng) {
  if (markerLayer) map.removeLayer(markerLayer);
  const icon = L.divIcon({ className:'', html:'<div class="my-marker"></div>', iconSize:[16,16], iconAnchor:[8,8] });
  markerLayer = L.marker([lat, lng], { icon }).addTo(map);
}

// ── STATS ─────────────────────────────────────────────────────────────
function calcDist(pts) {
  let d = 0;
  for (let i = 1; i < pts.length; i++)
    d += map.distance(pts[i-1], pts[i]);
  return d;
}

function formatTime(ms) {
  const s = Math.floor(ms/1000), m = Math.floor(s/60);
  return `${String(m).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}

function updateStats() {
  document.getElementById('statDist').textContent = (calcDist(visitedPts)/1000).toFixed(2);
  document.getElementById('statPts').textContent = visitedPts.length;
  if (startTime) document.getElementById('statTime').textContent = formatTime(Date.now()-startTime);

  const cells = new Set();
  visitedPts.forEach(p => {
    cells.add(`${Math.floor(p[0]*500)},${Math.floor(p[1]*500)}`);
  });
  const pct = Math.min(100, cells.size * 0.06).toFixed(1);
  document.getElementById('pctText').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';
}

// ── SIMULATION ────────────────────────────────────────────────────────
function toggleSim() {
  if (isRunning) pauseSim();
  else startSim();
}

function startSim() {
  if (currentIdx >= FULL_ROUTE.length) return;
  isRunning = true;
  if (!startTime) startTime = Date.now();

  document.getElementById('btnSim').innerHTML = '⏸ Pause';
  document.getElementById('btnSim').classList.remove('btn-primary');
  document.getElementById('btnSim').style.background = 'var(--warn)';
  document.getElementById('btnSim').style.borderColor = 'var(--warn)';
  document.getElementById('btnSim').style.color = '#000';

  const pill = document.getElementById('statusPill');
  pill.classList.add('running');
  document.getElementById('statusText').textContent = 'En cours';

  if (!timerInterval) timerInterval = setInterval(updateStats, 500);

  scheduleNext();
}

function scheduleNext() {
  if (!isRunning) return;
  const delay = Math.max(20, 120 / speed);
  simInterval = setTimeout(step, delay);
}

function step() {
  if (!isRunning || currentIdx >= FULL_ROUTE.length) {
    finishSim();
    return;
  }
  const pt = FULL_ROUTE[currentIdx];
  visitedPts.push(pt);
  polyline.addLatLng(pt);
  updateMarker(pt[0], pt[1]);

  // Follow marker smoothly
  if (currentIdx % 5 === 0) {
    map.panTo(pt, { animate: true, duration: 0.3 });
  }

  redrawFog();
  currentIdx++;
  scheduleNext();
}

function pauseSim() {
  isRunning = false;
  clearTimeout(simInterval);
  document.getElementById('btnSim').innerHTML = '▶ Reprendre';
  document.getElementById('btnSim').style.background = 'var(--accent)';
  document.getElementById('btnSim').style.borderColor = 'var(--accent)';
  document.getElementById('btnSim').style.color = '#000';
  document.getElementById('statusPill').classList.remove('running');
  document.getElementById('statusText').textContent = 'En pause';
}

function finishSim() {
  isRunning = false;
  clearTimeout(simInterval);
  clearInterval(timerInterval);
  document.getElementById('btnSim').innerHTML = '✓ Terminé';
  document.getElementById('btnSim').disabled = true;
  document.getElementById('statusPill').classList.remove('running');
  document.getElementById('statusText').textContent = 'Terminé';
  updateStats();
}

function resetSim() {
  isRunning = false;
  clearTimeout(simInterval);
  clearInterval(timerInterval);
  timerInterval = null;
  currentIdx = 0;
  visitedPts = [];
  startTime = null;

  initPolyline();
  if (markerLayer) { map.removeLayer(markerLayer); markerLayer = null; }
  redrawFog();
  updateStats();

  document.getElementById('statTime').textContent = '00:00';
  document.getElementById('btnSim').innerHTML = '▶ Démarrer';
  document.getElementById('btnSim').disabled = false;
  document.getElementById('btnSim').style.background = 'var(--accent)';
  document.getElementById('btnSim').style.borderColor = 'var(--accent)';
  document.getElementById('btnSim').style.color = '#000';
  document.getElementById('statusPill').classList.remove('running');
  document.getElementById('statusText').textContent = 'Prêt';

  map.setView([48.8566, 2.3522], 16);
}

function setSpeed(s) {
  speed = s;
  document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sp'+s).classList.add('active');
}

// ── INIT ──────────────────────────────────────────────────────────────
initFog();
initPolyline();
map.setView([48.8566, 2.3522], 16);
updateStats();
</script>
</body>
</html>
